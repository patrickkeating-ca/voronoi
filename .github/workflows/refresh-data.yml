name: Refresh regime data

on:
  schedule:
    - cron: "0 13 * * *" # daily, 13:00 UTC (after FRED's usual daily update)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Fetch latest FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit data/regime-data.js if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regime-data.js
          if git diff --cached --quiet; then
            echo "No new data -- nothing to commit."
          else
            git commit -m "Refresh regime data ($(date -u +%Y-%m-%d))"
            git push
          fi
